#set( $symbol_dollar = '$' )
spring:
  datasource:
    url: ${symbol_dollar}{DB_URL}
    username: ${symbol_dollar}{DB_USERNAME}
    password: ${symbol_dollar}{DB_PASSWORD:ENC(v1:replace-with-base64-iv:replace-with-base64-ciphertext:replace-with-base64-tag)}
    hikari:
      pool-name: ${symbol_dollar}{HIKARI_POOL_NAME:${symbol_dollar}{spring.application.name}-hikari}
      maximum-pool-size: ${symbol_dollar}{HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${symbol_dollar}{HIKARI_MIN_IDLE:5}
      connection-timeout: ${symbol_dollar}{HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${symbol_dollar}{HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${symbol_dollar}{HIKARI_MAX_LIFETIME:1800000}
      keepalive-time: ${symbol_dollar}{HIKARI_KEEPALIVE_TIME:300000}
      validation-timeout: ${symbol_dollar}{HIKARI_VALIDATION_TIMEOUT:5000}
  flyway:
    enabled: ${symbol_dollar}{FLYWAY_ENABLED:true}
    locations: classpath:db/migration/default
    validate-migration-naming: true
    baseline-on-migrate: ${symbol_dollar}{FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: true
    clean-disabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

app:
  integrations:
    organization:
      enabled: ${symbol_dollar}{ORGANIZATION_FACADE_ENABLED:true}
      group: ${symbol_dollar}{ORGANIZATION_FACADE_GROUP:student-management-organization}
      version: ${symbol_dollar}{ORGANIZATION_FACADE_SERVICE_VERSION:1.0.0}
    rabbitmq:
      enabled: ${symbol_dollar}{RABBITMQ_ENABLED:true}
      listener-auto-startup: ${symbol_dollar}{RABBITMQ_LISTENER_AUTO_STARTUP:true}

management:
  endpoint:
    health:
      show-details: never
