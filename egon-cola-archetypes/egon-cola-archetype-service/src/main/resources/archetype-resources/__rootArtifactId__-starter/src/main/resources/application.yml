#set( $symbol_dollar = '$' )
spring:
  profiles:
    default: local
  config:
    import:
      - optional:file:./config/application-secrets.yml
      - optional:configtree:/run/secrets/
  threads:
    virtual:
      enabled: ${symbol_dollar}{SPRING_THREADS_VIRTUAL_ENABLED:true}
  lifecycle:
    timeout-per-shutdown-phase: ${symbol_dollar}{SHUTDOWN_TIMEOUT:30s}
  task:
    execution:
      thread-name-prefix: ${symbol_dollar}{ASYNC_THREAD_NAME_PREFIX:egon-async-}
      shutdown:
        await-termination: true
        await-termination-period: ${symbol_dollar}{ASYNC_AWAIT_TERMINATION:30s}
      pool:
        core-size: ${symbol_dollar}{ASYNC_CORE_SIZE:8}
        max-size: ${symbol_dollar}{ASYNC_MAX_SIZE:32}
        queue-capacity: ${symbol_dollar}{ASYNC_QUEUE_CAPACITY:500}
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: ${symbol_dollar}{SCHEDULING_AWAIT_TERMINATION:30s}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: ${symbol_dollar}{APP_TIME_ZONE:Asia/Shanghai}
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${symbol_dollar}{MANAGEMENT_SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: ${symbol_dollar}{MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${symbol_dollar}{MANAGEMENT_HEALTH_SHOW_DETAILS:never}
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

app:
  integrations:
    organization:
      enabled: ${symbol_dollar}{ORGANIZATION_FACADE_ENABLED:false}
      group: ${symbol_dollar}{ORGANIZATION_FACADE_GROUP:student-management-organization}
      version: ${symbol_dollar}{ORGANIZATION_FACADE_SERVICE_VERSION:1.0.0}
    rabbitmq:
      enabled: ${symbol_dollar}{RABBITMQ_ENABLED:false}
      listener-auto-startup: ${symbol_dollar}{RABBITMQ_LISTENER_AUTO_STARTUP:false}
      exchange: ${symbol_dollar}{RABBITMQ_EXCHANGE:evaluation.events}
      score-command-queue: ${symbol_dollar}{RABBITMQ_SCORE_COMMAND_QUEUE:evaluation.score.command}
      score-command-routing-key: ${symbol_dollar}{RABBITMQ_SCORE_COMMAND_ROUTING_KEY:score.record.command}
      course-scheduled-routing-key: ${symbol_dollar}{RABBITMQ_COURSE_SCHEDULED_ROUTING_KEY:course.scheduled}
      exam-published-routing-key: ${symbol_dollar}{RABBITMQ_EXAM_PUBLISHED_ROUTING_KEY:exam.published}
      score-recorded-routing-key: ${symbol_dollar}{RABBITMQ_SCORE_RECORDED_ROUTING_KEY:score.recorded}

dubbo:
  application:
    name: ${symbol_dollar}{spring.application.name}
  registry:
    address: ${symbol_dollar}{DUBBO_REGISTRY_ADDRESS:N/A}
  protocol:
    name: tri
    port: ${symbol_dollar}{DUBBO_PORT:50051}
  provider:
    timeout: 3000
    retries: 0
  consumer:
    timeout: ${symbol_dollar}{DUBBO_CONSUMER_TIMEOUT:3000}
    retries: 0
    check: true
