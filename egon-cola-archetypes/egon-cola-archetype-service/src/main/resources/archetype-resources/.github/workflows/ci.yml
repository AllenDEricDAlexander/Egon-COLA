name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: SPRING_PROFILES_ACTIVE=test bash ./mvnw -B -ntp clean test
      - run: SPRING_PROFILES_ACTIVE=test bash ./mvnw -B -ntp -DskipTests package
      - run: >-
          docker build
          --build-arg CONTAINER_ENGINE=docker
          --file deploy/container/Dockerfile
          --tag ${rootArtifactId}:ci
          .
