#set( $symbol_dollar = '$' )
spring:
  profiles:
    default: dev
  config:
    import:
      - optional:file:./config/application-secrets.yml
      - optional:configtree:/run/secrets/
  threads:
    virtual:
      enabled: ${symbol_dollar}{SPRING_THREADS_VIRTUAL_ENABLED:true}
  lifecycle:
    timeout-per-shutdown-phase: ${symbol_dollar}{SHUTDOWN_TIMEOUT:30s}
  task:
    execution:
      thread-name-prefix: ${symbol_dollar}{ASYNC_THREAD_NAME_PREFIX:egon-async-}
      shutdown:
        await-termination: true
        await-termination-period: ${symbol_dollar}{ASYNC_AWAIT_TERMINATION:30s}
      pool:
        core-size: ${symbol_dollar}{ASYNC_CORE_SIZE:8}
        max-size: ${symbol_dollar}{ASYNC_MAX_SIZE:32}
        queue-capacity: ${symbol_dollar}{ASYNC_QUEUE_CAPACITY:500}
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: ${symbol_dollar}{SCHEDULING_AWAIT_TERMINATION:30s}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: ${symbol_dollar}{APP_TIME_ZONE:Asia/Shanghai}
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
  rabbitmq:
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 5s

server:
  port: ${symbol_dollar}{SERVER_PORT:8080}
  shutdown: graceful
  tomcat:
    threads:
      max: ${symbol_dollar}{TOMCAT_THREADS_MAX:200}
      min-spare: ${symbol_dollar}{TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${symbol_dollar}{TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${symbol_dollar}{TOMCAT_MAX_CONNECTIONS:8192}
    connection-timeout: ${symbol_dollar}{TOMCAT_CONNECTION_TIMEOUT:20s}
    keep-alive-timeout: ${symbol_dollar}{TOMCAT_KEEP_ALIVE_TIMEOUT:20s}
    max-keep-alive-requests: ${symbol_dollar}{TOMCAT_MAX_KEEP_ALIVE_REQUESTS:100}
    max-http-form-post-size: ${symbol_dollar}{TOMCAT_MAX_HTTP_FORM_POST_SIZE:2MB}
    max-swallow-size: ${symbol_dollar}{TOMCAT_MAX_SWALLOW_SIZE:2MB}
    processor-cache: ${symbol_dollar}{TOMCAT_PROCESSOR_CACHE:200}
    mbeanregistry:
      enabled: ${symbol_dollar}{TOMCAT_MBEAN_REGISTRY_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: ${symbol_dollar}{MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${symbol_dollar}{MANAGEMENT_HEALTH_SHOW_DETAILS:never}
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

logging:
  file:
    path: ${symbol_dollar}{LOG_HOME:./logs}
  group:
    web-stack: org.springframework.web,org.springframework.http,org.apache.catalina,org.apache.coyote
    persistence: org.mybatis,org.mybatis.spring,com.baomidou.mybatisplus,org.springframework.jdbc,org.hibernate.SQL
    rpc: org.apache.dubbo,io.grpc
    messaging: org.springframework.kafka,org.springframework.amqp
  level:
    root: info
    web-stack: info
    persistence: warn
    rpc: info
    messaging: info
    ${groupId}: info
  logback:
    rollingpolicy:
      max-file-size: ${symbol_dollar}{LOG_MAX_FILE_SIZE:100MB}
      max-history: ${symbol_dollar}{LOG_MAX_HISTORY:30}
      total-size-cap: ${symbol_dollar}{LOG_TOTAL_SIZE_CAP:10GB}
      clean-history-on-start: ${symbol_dollar}{LOG_CLEAN_HISTORY_ON_START:false}

app:
  logging:
    instance-name: ${symbol_dollar}{INSTANCE_ID:${symbol_dollar}{HOSTNAME:local}}
    error-total-size-cap: ${symbol_dollar}{LOG_ERROR_TOTAL_SIZE_CAP:2GB}
    async:
      queue-size: ${symbol_dollar}{LOG_ASYNC_QUEUE_SIZE:8192}
      discarding-threshold: ${symbol_dollar}{LOG_ASYNC_DISCARDING_THRESHOLD:0}
      never-block: ${symbol_dollar}{LOG_ASYNC_NEVER_BLOCK:false}
      max-flush-time: ${symbol_dollar}{LOG_ASYNC_MAX_FLUSH_TIME:5000}

dubbo:
  application:
    name: ${symbol_dollar}{spring.application.name}
  registry:
    address: ${symbol_dollar}{DUBBO_REGISTRY_ADDRESS:N/A}
  protocol:
    name: tri
    port: ${symbol_dollar}{DUBBO_PORT:50051}
  provider:
    timeout: 3000
    retries: 0
  consumer:
    timeout: ${symbol_dollar}{DUBBO_CONSUMER_TIMEOUT:3000}
    retries: 0
    check: true

organization:
  integrations:
    evaluation:
      enabled: ${symbol_dollar}{EVALUATION_FACADE_ENABLED:false}
      course-group: ${symbol_dollar}{EVALUATION_COURSE_FACADE_GROUP:course}
      exam-group: ${symbol_dollar}{EVALUATION_EXAM_FACADE_GROUP:exam}
      score-group: ${symbol_dollar}{EVALUATION_SCORE_FACADE_GROUP:score}
      version: ${symbol_dollar}{EVALUATION_FACADE_SERVICE_VERSION:1.0.0}
