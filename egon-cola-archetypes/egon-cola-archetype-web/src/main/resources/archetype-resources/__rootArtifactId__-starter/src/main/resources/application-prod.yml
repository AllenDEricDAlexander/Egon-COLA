#set( $symbol_dollar = '$' )
spring:
  datasource:
    url: ${symbol_dollar}{DB_URL}
    username: ${symbol_dollar}{DB_USERNAME}
    password: ${symbol_dollar}{DB_PASSWORD:ENC(v1:replace-with-base64-iv:replace-with-base64-ciphertext:replace-with-base64-tag)}
    hikari:
      pool-name: ${symbol_dollar}{HIKARI_POOL_NAME:${symbol_dollar}{spring.application.name}-hikari}
      maximum-pool-size: ${symbol_dollar}{HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${symbol_dollar}{HIKARI_MIN_IDLE:5}
      connection-timeout: ${symbol_dollar}{HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${symbol_dollar}{HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${symbol_dollar}{HIKARI_MAX_LIFETIME:1800000}
      keepalive-time: ${symbol_dollar}{HIKARI_KEEPALIVE_TIME:300000}
      validation-timeout: ${symbol_dollar}{HIKARI_VALIDATION_TIMEOUT:5000}
  flyway:
    enabled: ${symbol_dollar}{FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${symbol_dollar}{FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: true
    clean-disabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  data:
    redis:
      host: ${symbol_dollar}{REDIS_HOST}
      port: ${symbol_dollar}{REDIS_PORT:6379}
      password: ${symbol_dollar}{REDIS_PASSWORD:}
  rabbitmq:
    host: ${symbol_dollar}{RABBITMQ_HOST}
    port: ${symbol_dollar}{RABBITMQ_PORT:5672}
    username: ${symbol_dollar}{RABBITMQ_USERNAME}
    password: ${symbol_dollar}{RABBITMQ_PASSWORD}

dubbo:
  protocol:
    name: dubbo
    port: ${symbol_dollar}{DUBBO_PROTOCOL_PORT:50051}

organization:
  integrations:
    redis:
      enabled: ${symbol_dollar}{ORGANIZATION_REDIS_ENABLED:true}
    rabbit:
      enabled: ${symbol_dollar}{ORGANIZATION_RABBIT_ENABLED:true}
  cache:
    user-ttl: ${symbol_dollar}{ORGANIZATION_USER_CACHE_TTL:PT10M}
    grade-ttl: ${symbol_dollar}{ORGANIZATION_GRADE_CACHE_TTL:PT30M}
    school-class-ttl: ${symbol_dollar}{ORGANIZATION_SCHOOL_CLASS_CACHE_TTL:PT10M}
  command:
    idempotency-ttl: ${symbol_dollar}{ORGANIZATION_IDEMPOTENCY_TTL:PT24H}

management:
  endpoint:
    health:
      show-details: never
