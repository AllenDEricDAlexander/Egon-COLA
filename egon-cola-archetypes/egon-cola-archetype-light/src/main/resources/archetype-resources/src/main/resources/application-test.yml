#set( $symbol_dollar = '$' )
spring:
  datasource:
    url: ${symbol_dollar}{DB_URL:jdbc:h2:mem:${artifactId}-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${symbol_dollar}{DB_USERNAME:sa}
    password: ${symbol_dollar}{DB_PASSWORD:}
    driver-class-name: org.h2.Driver
    hikari:
      pool-name: ${symbol_dollar}{HIKARI_POOL_NAME:${symbol_dollar}{spring.application.name}-hikari}
      maximum-pool-size: ${symbol_dollar}{HIKARI_MAX_POOL_SIZE:8}
      minimum-idle: ${symbol_dollar}{HIKARI_MIN_IDLE:1}
  flyway:
    enabled: true
    locations: classpath:db/migration/default
    clean-disabled: false
    validate-on-migrate: true
    validate-migration-naming: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

management:
  health:
    rabbit:
      enabled: false
    redis:
      enabled: false

dubbo:
  provider:
    export: false

app:
  integrations:
    rabbitmq:
      enabled: false
    redis:
      enabled: false
    external-http:
      enabled: false
