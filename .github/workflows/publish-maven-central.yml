name: Publish Maven Central

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Module to publish"
        required: true
        default: "cola-components"
        type: choice
        options:
          - cola-components
          - cola-archetypes
          - all
      skip_tests:
        description: "Skip tests"
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish selected target
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          TEST_ARG=""
          if [ "${{ inputs.skip_tests }}" = "true" ]; then
            TEST_ARG="-DskipTests"
          fi

          MVN_ARGS="-B -ntp -Prelease -Dgpg.passphrase=${GPG_PASSPHRASE} ${TEST_ARG} clean deploy"

          if [ "${{ inputs.target }}" = "all" ]; then
            bash ./mvnw ${MVN_ARGS}
          else
            bash ./mvnw -f ${{ inputs.target }}/pom.xml ${MVN_ARGS}
          fi
