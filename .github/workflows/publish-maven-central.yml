name: Publish Maven Central

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Module to publish"
        required: true
        default: "egon-cola-components"
        type: choice
        options:
          - egon-cola-components
          - egon-cola-archetypes
          - all
      skip_tests:
        description: "Skip tests"
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish selected target
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          MVN_ARGS=(-B -ntp -Prelease "-Dgpg.passphrase=${GPG_PASSPHRASE}")
          if [ "${{ inputs.skip_tests }}" = "true" ]; then
            MVN_ARGS+=("-DskipTests")
          fi
          MVN_ARGS+=(clean deploy)

          if [ "${{ inputs.target }}" = "all" ]; then
            bash ./mvnw "${MVN_ARGS[@]}"
          else
            bash ./mvnw -f "${{ inputs.target }}/pom.xml" "${MVN_ARGS[@]}"
          fi
