name: Fast CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Fast CI / Java ${{ matrix.java }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        java:
          - 21

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Prepare Maven Wrapper
        run: |
          chmod +x ./mvnw || true
          java -version
          ./mvnw -version

      - name: Build and test with Maven
        run: |
          ./mvnw -B -ntp \
            -DtrimStackTrace=false \
            -Dgpg.skip=true \
            clean verify

      - name: Remove self-installed Maven artifacts
        if: always()
        run: |
          rm -rf \
            "$HOME/.m2/repository/top/egon" \
            "$HOME/.m2/repository/com/alibaba/cola" \
            "$HOME/.m2/repository/com/alibaba/craftsman"
