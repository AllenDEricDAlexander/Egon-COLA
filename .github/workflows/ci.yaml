name: Fast CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Fast CI / Rocky Linux 10 / Java 21
    runs-on: [self-hosted, linux, x64, rocky-linux-10]
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Verify Rocky Linux 10 runner
        run: |
          set -euo pipefail
          source /etc/os-release
          if [[ "${ID:-}" != "rocky" || "${VERSION_ID%%.*}" != "10" ]]; then
            echo "Expected Rocky Linux 10 runner, found ${PRETTY_NAME:-unknown}." >&2
            exit 1
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
          cache: maven

      - name: Prepare Maven Wrapper
        run: |
          chmod +x ./mvnw || true
          java -version
          ./mvnw -version

      - name: Build, test, and install with Maven
        run: |
          ./mvnw -B -ntp \
            -DtrimStackTrace=false \
            -Dgpg.skip=true \
            clean install

      - name: Remove self-installed Maven artifacts
        if: always()
        run: |
          rm -rf \
            "$HOME/.m2/repository/top/egon" \
            "$HOME/.m2/repository/com/alibaba/cola" \
            "$HOME/.m2/repository/com/alibaba/craftsman"
