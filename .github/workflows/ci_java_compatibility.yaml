name: CI Java Compatibility

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Build & Verify / Rocky Linux 10 / JDK ${{ matrix.java-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      ROCKY_IMAGE: rockylinux/rockylinux:10

    strategy:
      fail-fast: false
      matrix:
        java-version: [21, 25]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build and install repository on Rocky Linux 10
        shell: bash
        run: |
          set -euo pipefail
          ROCKY_HOME="${RUNNER_TEMP}/rocky-home"
          mkdir -p "${ROCKY_HOME}" "${HOME}/.m2"
          docker pull "${ROCKY_IMAGE}"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/home/runner \
            --env JAVA_HOME=/opt/java \
            --env MAVEN_USER_HOME=/home/runner/.m2 \
            --env "PATH=/opt/java/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            --volume "${GITHUB_WORKSPACE}:/workspace" \
            --volume "${ROCKY_HOME}:/home/runner" \
            --volume "${HOME}/.m2:/home/runner/.m2" \
            --volume "${JAVA_HOME}:/opt/java:ro" \
            --workdir /workspace \
            "${ROCKY_IMAGE}" \
            bash -lc '
              set -euo pipefail
              source /etc/os-release
              if [[ "${ID:-}" != "rocky" || "${VERSION_ID%%.*}" != "10" ]]; then
                echo "Expected Rocky Linux 10 container, found ${PRETTY_NAME:-unknown}." >&2
                exit 1
              fi
              chmod +x ./mvnw
              java -version
              ./mvnw -version
              ./mvnw -B -ntp clean install
            '

      - name: Verify bytecode component and release shape with a clean scan
        shell: bash
        run: |
          set -euo pipefail
          ROCKY_HOME="${RUNNER_TEMP}/rocky-home"
          mkdir -p "${ROCKY_HOME}" "${HOME}/.m2"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/home/runner \
            --env JAVA_HOME=/opt/java \
            --env MAVEN_USER_HOME=/home/runner/.m2 \
            --env "PATH=/opt/java/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            --volume "${GITHUB_WORKSPACE}:/workspace" \
            --volume "${ROCKY_HOME}:/home/runner" \
            --volume "${HOME}/.m2:/home/runner/.m2" \
            --volume "${JAVA_HOME}:/opt/java:ro" \
            --workdir /workspace \
            "${ROCKY_IMAGE}" \
            bash -lc '
              set -euo pipefail
              ./mvnw -B -ntp \
                -pl egon-cola-components/egon-cola-component-bytecode/egon-cola-component-bytecode-test \
                -am \
                -Prelease \
                -Dgpg.skip=true \
                -Degon.release.shape=true \
                -DegonArchitecture.cache.enabled=false \
                verify
              METHOD_EXTENSION_REPORT="egon-cola-components/egon-cola-component-bytecode/egon-cola-component-bytecode-test/target/failsafe-reports/top.egon.cola.component.bytecode.test.agent.MethodExtensionAgentIntegrationTest.txt"
              METHOD_EXTENSION_SPRING_LOG="egon-cola-components/egon-cola-component-bytecode/egon-cola-component-bytecode-test/target/it/method-extension-spring/build.log"
              ACCESS_GUARD_REPORT="egon-cola-components/egon-cola-component-bytecode/egon-cola-component-bytecode-test/target/failsafe-reports/top.egon.cola.component.bytecode.test.agent.AccessGuardAgentIntegrationTest.txt"
              ACCESS_GUARD_SPRING_LOG="egon-cola-components/egon-cola-component-bytecode/egon-cola-component-bytecode-test/target/it/access-guard-spring/build.log"
              test -f "${METHOD_EXTENSION_REPORT}"
              grep -Fq "Failures: 0, Errors: 0" "${METHOD_EXTENSION_REPORT}"
              grep -Fq "METHOD_EXTENSION_SPRING_OK handlers=4" "${METHOD_EXTENSION_SPRING_LOG}"
              test -f "${ACCESS_GUARD_REPORT}"
              grep -Fq "Failures: 0, Errors: 0" "${ACCESS_GUARD_REPORT}"
              grep -Fq "ACCESS_GUARD_SPRING_OK events=3" "${ACCESS_GUARD_SPRING_LOG}"
              java -jar \
                egon-cola-components/egon-cola-component-bytecode/egon-cola-component-bytecode-benchmark/target/egon-cola-component-bytecode-benchmark-benchmarks.jar \
                -l | grep -F ArchitectureScanBenchmark.scanOneThousandClasses
              java -jar \
                egon-cola-components/egon-cola-component-bytecode/egon-cola-component-bytecode-benchmark/target/egon-cola-component-bytecode-benchmark-benchmarks.jar \
                -l | grep -F ExecutorEnhancementBenchmark.transformOneThousandClasses
              java -jar \
                egon-cola-components/egon-cola-component-bytecode/egon-cola-component-bytecode-benchmark/target/egon-cola-component-bytecode-benchmark-benchmarks.jar \
                -l | grep -F MethodObservationBenchmark.enabledSuccess
            '

      - name: Resolve project version
        id: project-version
        shell: bash
        run: |
          set -euo pipefail
          ROCKY_HOME="${RUNNER_TEMP}/rocky-home"
          mkdir -p "${ROCKY_HOME}" "${HOME}/.m2"
          VERSION="$(docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/home/runner \
            --env JAVA_HOME=/opt/java \
            --env MAVEN_USER_HOME=/home/runner/.m2 \
            --env "PATH=/opt/java/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            --volume "${GITHUB_WORKSPACE}:/workspace" \
            --volume "${ROCKY_HOME}:/home/runner" \
            --volume "${HOME}/.m2:/home/runner/.m2" \
            --volume "${JAVA_HOME}:/opt/java:ro" \
            --workdir /workspace \
            "${ROCKY_IMAGE}" \
            bash -lc './mvnw -q -N help:evaluate -Dexpression=project.version -DforceStdout')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved project version: ${VERSION}"

      - name: Verify generated archetype projects
        shell: bash
        env:
          PROJECT_VERSION: ${{ steps.project-version.outputs.version }}
          JAVA_VERSION: ${{ matrix.java-version }}
        run: |
          set -euo pipefail

          ARCHETYPES=(
            "egon-cola-archetype-light:light"
            "egon-cola-archetype-service:service"
            "egon-cola-archetype-web:web"
          )

          ROCKY_HOME="${RUNNER_TEMP}/rocky-home"
          HOST_WORK_DIR="${RUNNER_TEMP}/egon-cola-archetype-it"
          CONTAINER_WORK_DIR="/runner-temp/egon-cola-archetype-it"
          mkdir -p "${ROCKY_HOME}" "${HOME}/.m2"
          rm -rf "${HOST_WORK_DIR}"
          mkdir -p "${HOST_WORK_DIR}"

          rocky_run() {
            local container_workdir="$1"
            local command="$2"
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              --env HOME=/home/runner \
              --env JAVA_HOME=/opt/java \
              --env MAVEN_USER_HOME=/home/runner/.m2 \
              --env "PATH=/opt/java/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
              --volume "${GITHUB_WORKSPACE}:/workspace" \
              --volume "${RUNNER_TEMP}:/runner-temp" \
              --volume "${ROCKY_HOME}:/home/runner" \
              --volume "${HOME}/.m2:/home/runner/.m2" \
              --volume "${JAVA_HOME}:/opt/java:ro" \
              --workdir "${container_workdir}" \
              "${ROCKY_IMAGE}" \
              bash -lc "${command}"
          }

          for item in "${ARCHETYPES[@]}"; do
            IFS=":" read -r ARCHETYPE_ARTIFACT_ID SHORT_NAME <<< "${item}"

            APP_NAME="ci-${SHORT_NAME}-demo-java-${JAVA_VERSION}"
            PACKAGE_NAME="top.egon.cola.ci.${SHORT_NAME}"

            echo "Generating ${APP_NAME} by ${ARCHETYPE_ARTIFACT_ID}:${PROJECT_VERSION}"

            rocky_run /workspace \
              "./mvnw -B -ntp archetype:generate \
                -DarchetypeGroupId=top.egon \
                -DarchetypeArtifactId=${ARCHETYPE_ARTIFACT_ID} \
                -DarchetypeVersion=${PROJECT_VERSION} \
                -DgroupId=top.egon.cola.ci \
                -DartifactId=${APP_NAME} \
                -Dversion=1.0.0-SNAPSHOT \
                -Dpackage=${PACKAGE_NAME} \
                -DinteractiveMode=false \
                -DoutputDirectory=${CONTAINER_WORK_DIR}"

            HOST_PROJECT_DIR="${HOST_WORK_DIR}/${APP_NAME}"
            CONTAINER_PROJECT_DIR="${CONTAINER_WORK_DIR}/${APP_NAME}"
            pushd "${HOST_PROJECT_DIR}"

            if [ "${SHORT_NAME}" = "service" ]; then
              test -f .github/workflows/ci.yml
              grep -Fq 'SPRING_PROFILES_ACTIVE=test bash ./mvnw -B -ntp clean test' .github/workflows/ci.yml
              grep -Fq 'docker build' .github/workflows/ci.yml
              grep -Fq -- '--file deploy/container/Dockerfile' .github/workflows/ci.yml
              grep -Fq -- '--tag ci-service-demo-java-${JAVA_VERSION}:ci' .github/workflows/ci.yml
            fi

            test -f ./mvnw
            chmod +x ./mvnw
            if [ "${SHORT_NAME}" = "web" ]; then
              rocky_run "${CONTAINER_PROJECT_DIR}" \
                'SPRING_PROFILES_ACTIVE=test ./mvnw -V --no-transfer-progress clean verify'
            else
              rocky_run "${CONTAINER_PROJECT_DIR}" \
                'SPRING_PROFILES_ACTIVE=test ./mvnw -V --no-transfer-progress clean test'
            fi
            rocky_run "${CONTAINER_PROJECT_DIR}" \
              'SPRING_PROFILES_ACTIVE=test ./mvnw -V --no-transfer-progress -DskipTests package'
            docker build \
              --file deploy/container/Dockerfile \
              --tag "egon-generated-${SHORT_NAME}:java-${JAVA_VERSION}" \
              .

            popd
          done

      - name: Remove self-installed Maven artifacts
        if: always()
        shell: bash
        run: |
          rm -rf \
            "$HOME/.m2/repository/top/egon" \
            "$HOME/.m2/repository/com/alibaba/cola" \
            "$HOME/.m2/repository/com/alibaba/craftsman"
