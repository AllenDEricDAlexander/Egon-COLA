name: CI Java Compatibility

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Build & Verify / Rocky Linux 10 / JDK 21
    runs-on: [self-hosted, linux, x64, rocky-linux-10]
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify Rocky Linux 10 runner
        shell: bash
        run: |
          set -euo pipefail
          source /etc/os-release
          if [[ "${ID:-}" != "rocky" || "${VERSION_ID%%.*}" != "10" ]]; then
            echo "Expected Rocky Linux 10 runner, found ${PRETTY_NAME:-unknown}." >&2
            exit 1
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
          cache: maven

      - name: Prepare Maven Wrapper
        shell: bash
        run: |
          chmod +x ./mvnw
          java -version
          ./mvnw -version

      - name: Build and install repository
        shell: bash
        run: |
          ./mvnw -B -ntp clean install

      - name: Resolve project version
        id: project-version
        shell: bash
        run: |
          VERSION="$(./mvnw -q -N help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved project version: ${VERSION}"

      - name: Verify generated archetype projects
        shell: bash
        env:
          PROJECT_VERSION: ${{ steps.project-version.outputs.version }}
          JAVA_VERSION: '21'
        run: |
          set -euo pipefail

          ARCHETYPES=(
            "egon-cola-archetype-light:light"
            "egon-cola-archetype-service:service"
            "egon-cola-archetype-web:web"
          )

          WORK_DIR="${RUNNER_TEMP}/egon-cola-archetype-it"
          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}"

          for item in "${ARCHETYPES[@]}"; do
            IFS=":" read -r ARCHETYPE_ARTIFACT_ID SHORT_NAME <<< "${item}"

            APP_NAME="ci-${SHORT_NAME}-demo-java-${JAVA_VERSION}"
            PACKAGE_NAME="top.egon.cola.ci.${SHORT_NAME}"

            echo "Generating ${APP_NAME} by ${ARCHETYPE_ARTIFACT_ID}:${PROJECT_VERSION}"

            ./mvnw -B -ntp archetype:generate \
              -DarchetypeGroupId=top.egon \
              -DarchetypeArtifactId="${ARCHETYPE_ARTIFACT_ID}" \
              -DarchetypeVersion="${PROJECT_VERSION}" \
              -DgroupId=top.egon.cola.ci \
              -DartifactId="${APP_NAME}" \
              -Dversion=1.0.0-SNAPSHOT \
              -Dpackage="${PACKAGE_NAME}" \
              -DinteractiveMode=false \
              -DoutputDirectory="${WORK_DIR}"

            pushd "${WORK_DIR}/${APP_NAME}"

            if [ "${SHORT_NAME}" = "service" ]; then
              test -f .github/workflows/ci.yml
              grep -Fq 'SPRING_PROFILES_ACTIVE=test bash ./mvnw -B -ntp clean test' .github/workflows/ci.yml
              grep -Fq 'docker build' .github/workflows/ci.yml
              grep -Fq -- '--file deploy/container/Dockerfile' .github/workflows/ci.yml
              grep -Fq -- '--tag ci-service-demo-java-${JAVA_VERSION}:ci' .github/workflows/ci.yml
            fi

            if [ -f "./mvnw" ]; then
              chmod +x ./mvnw
              export SPRING_PROFILES_ACTIVE=test
              if [ "${SHORT_NAME}" = "web" ]; then
                ./mvnw -V --no-transfer-progress clean verify
              else
                ./mvnw -V --no-transfer-progress clean test
              fi
              ./mvnw -V --no-transfer-progress -DskipTests package
              docker build \
                --file deploy/container/Dockerfile \
                --tag "egon-generated-${SHORT_NAME}:java-${JAVA_VERSION}" \
                .
            else
              export SPRING_PROFILES_ACTIVE=test
              if [ "${SHORT_NAME}" = "web" ]; then
                mvn -V --no-transfer-progress clean verify
              else
                mvn -V --no-transfer-progress clean test
              fi
              mvn -V --no-transfer-progress -DskipTests package
              docker build \
                --file deploy/container/Dockerfile \
                --tag "egon-generated-${SHORT_NAME}:java-${JAVA_VERSION}" \
                .
            fi

            popd
          done

      - name: Remove self-installed Maven artifacts
        if: always()
        shell: bash
        run: |
          rm -rf \
            "$HOME/.m2/repository/top/egon" \
            "$HOME/.m2/repository/com/alibaba/cola" \
            "$HOME/.m2/repository/com/alibaba/craftsman"
